name: study_time_tracker
description: "Study Time Tracker mobile client."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management (mirrors activework-flutter-client reference architecture)
  bloc: ^9.2.0
  flutter_bloc: ^9.1.1
  equatable: ^2.0.7

  # Dependency injection
  get_it: ^9.2.1

  # Routing
  go_router: ^17.1.0

  # Networking
  dio: ^5.8.0+1

  # Secure storage + filesystem
  flutter_secure_storage: ^10.0.0
  path_provider: ^2.1.4
  path: ^1.9.1

  # Serialization
  json_annotation: ^4.9.0

  # Local DB (offline-first, per ADR-0002)
  drift: ^2.20.0
  sqlite3_flutter_libs: ^0.5.24

  # Sync / connectivity (ADR-0004)
  connectivity_plus: ^6.1.0
  uuid: ^4.5.0

  # Push + notifications (ADR-0007)
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  flutter_local_notifications: ^18.0.1
  flutter_foreground_task: ^8.10.0

  # Analytics charts (ADR-0001 follow-up)
  fl_chart: ^0.69.0

  # Client-side PDF export (ADR-0008)
  pdf: ^3.11.1
  printing: ^5.13.3
  open_filex: ^4.5.0

  # Date / time
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  json_serializable: ^6.8.0
  drift_dev: ^2.20.0
  bloc_test: ^10.0.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
