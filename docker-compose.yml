services:
  mysql:
    image: mysql:8.0
    container_name: timetracker-mysql
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpw_dev_only}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-timetracker}
      MYSQL_USER: ${MYSQL_USER:-timetracker}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-change_me_dev}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - timetracker-mysql-data:/var/lib/mysql
    healthcheck:
      test:
        - CMD
        - mysqladmin
        - ping
        - -h
        - localhost
        - -uroot
        - -p${MYSQL_ROOT_PASSWORD:-rootpw_dev_only}
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  timetracker-mysql-data:
